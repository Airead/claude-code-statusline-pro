name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-x64
            binary: claude-code-statusline-pro
            artifact: linux-x64
            use_cross: true
          - os: macos-15
            target: aarch64-apple-darwin
            platform: macos-arm64
            binary: claude-code-statusline-pro
            artifact: macos-arm64
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build ${{ matrix.target }}
        shell: bash
        run: |
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Collect artifact
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} artifacts/
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.binary }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Package release binaries
        run: |
          set -euo pipefail
          mkdir -p release

          declare -A TARGETS=(
            ["macos-arm64"]="claude-code-statusline-pro"
            ["linux-x64"]="claude-code-statusline-pro"
          )

          for platform in "${!TARGETS[@]}"; do
            binary="${TARGETS[$platform]}"
            artifact_path="dist/artifacts/${platform}/${binary}"
            if [ -f "${artifact_path}" ]; then
              chmod +x "${artifact_path}" 2>/dev/null || true
              tar -czf "release/claude-code-statusline-pro-${platform}.tar.gz" \
                -C "dist/artifacts/${platform}" "${binary}"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*.tar.gz
